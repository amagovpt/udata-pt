# udata config used by the disposable E2E test stack.
#
# Loaded via UDATA_SETTINGS=/path/to/udata.test.cfg when starting the
# dedicated test backend (port 7001) wired to docker-compose.test.yml.
# All values mirror udata.cfg but point to the isolated MongoDB (27018)
# and Redis (6380) instances so destructive tests cannot touch the dev DB.

import os

from dotenv import load_dotenv
from tlds import tld_set

load_dotenv()


def _env(var, default=None):
    return os.getenv(var, default)


def _env_int(var, default=0):
    try:
        return int(os.getenv(var, default))
    except (TypeError, ValueError):
        return default


def _env_bool(var, default=False):
    return os.getenv(var, str(default)).lower() in ("true", "1", "yes")


# Core ----------------------------------------------------------------------
DEBUG = True
API_TOKEN_SECRET = "test-secret"
SITE_ID = _env("SITE_ID", "localhost:7001")
SITE_TITLE = "dados.gov.pt — E2E test stack"
SITE_AUTHOR = "dados.gov.pt"
SERVER_NAME = _env("SERVER_NAME", "localhost:7001")
PREFERRED_URL_SCHEME = "http"
CDATA_BASE_URL = _env("CDATA_BASE_URL_TEST", "http://localhost:3001")

# Disposable infra hosts/ports ---------------------------------------------
SERVER_MONGO_TEST = _env("SERVER_MONGO_TEST", "localhost")
MONGO_PORT_TEST = _env_int("MONGO_PORT_TEST", 27019)
MONGO_DB_TEST = _env("MONGO_DB_TEST", "udata_e2e")
SERVER_REDIS_TEST = _env("SERVER_REDIS_TEST", "localhost")
REDIS_PORT_TEST = _env_int("REDIS_PORT_TEST", 6380)

MONGODB_HOST = f"mongodb://{SERVER_MONGO_TEST}:{MONGO_PORT_TEST}/{MONGO_DB_TEST}"

CACHE_TYPE = "redis"
CACHE_REDIS_URL = f"redis://{SERVER_REDIS_TEST}:{REDIS_PORT_TEST}/2"

CELERY_BROKER_URL = f"redis://{SERVER_REDIS_TEST}:{REDIS_PORT_TEST}/0"
CELERY_RESULT_BACKEND = f"redis://{SERVER_REDIS_TEST}:{REDIS_PORT_TEST}/1"
CELERY_RESULT_EXPIRES = 3600
CELERY_WORKER_HIJACK_ROOT_LOGGER = False
# Tasks run inline so destructive tests don't depend on a running worker.
CELERY_TASK_ALWAYS_EAGER = True
CELERY_TASK_EAGER_PROPAGATES = True

# Session/CSRF -------------------------------------------------------------
SESSION_COOKIE_DOMAIN = None
SESSION_COOKIE_SECURE = False
WTF_CSRF_ENABLED = False  # avoid CSRF noise in test runs

# Rate limiting tightened to a no-op
RATELIMIT_DEFAULT = "1000000 per day"
RATELIMIT_STORAGE_URI = "memory://"

# i18n
LANGUAGES = {"pt": "Português", "en": "English"}
DEFAULT_LANGUAGE = "pt"

# Search disabled — destructive tests don't reindex Elasticsearch.
SEARCH_BACKEND = "udata_search_service.backends.factories"
SEARCH_AUTOSCAN = False

# Mail off
SEND_MAIL = False

# TLDs (required by URLValidator)
ALLOWED_TLDS = list(tld_set)

# Public URLs resolve to the test frontend
URLS_RESOLVE_HOSTNAME = False

# Disable Sentry in tests
SENTRY_DSN = None
SENTRY_ENVIRONMENT = "e2e-test"
