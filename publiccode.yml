description:
  en:
    localisedName: dados.gov.pt
    shortDescription: Customizable and skinnable social platform dedicated to open data.
    longDescription: >
      Portuguese government fork of udata, the open data portal platform.
      It powers dados.gov.pt, the Portuguese national open data portal,
      managed by AMA (Agência para a Modernização Administrativa). It
      provides dataset cataloging, harvesting from remote sources, user
      contributions, spatial and temporal indexing, and a plugin
      architecture for customization.
    features:
      - Dataset cataloging and publishing
      - Harvesting from remote sources
      - Community contributions
      - Spatial and temporal search
      - Plugin and theme architecture
      - Full REST API
