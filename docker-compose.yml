services:
  app:
    build: .
    command: uv run gunicorn udata.wsgi:app --bind 0.0.0.0:7000 --workers 4 --threads 2 --timeout 120
    ports:
      - '7000:7000'
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - udata-fs:/udata/fs
      - app-logs:/logs
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      UDATA_SETTINGS: /app/udata.cfg
      SERVER_MONGO: host.docker.internal
      SERVER_REDIS: host.docker.internal
      MAIL_SERVER: mailpit
      MAIL_PORT: 1025
      MAIL_USE_TLS: 'False'
      MAIL_USE_SSL: 'False'
    depends_on:
      - mailpit
    restart: unless-stopped

  worker:
    build: .
    command: uv run celery -A udata.worker worker --events --concurrency=4 -l info
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - udata-fs:/udata/fs
      - app-logs:/logs
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      UDATA_SETTINGS: /app/udata.cfg
      C_FORCE_ROOT: 'true'
      SERVER_MONGO: host.docker.internal
      SERVER_REDIS: host.docker.internal
      MAIL_SERVER: mailpit
      MAIL_PORT: 1025
      MAIL_USE_TLS: 'False'
      MAIL_USE_SSL: 'False'
    depends_on:
      - mailpit
    restart: unless-stopped

  beat:
    build: .
    command: uv run celery -A udata.worker beat -l info
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - app-logs:/logs
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      UDATA_SETTINGS: /app/udata.cfg
      C_FORCE_ROOT: 'true'
      SERVER_MONGO: host.docker.internal
      SERVER_REDIS: host.docker.internal
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - '8025:8025'
      - '1025:1025'
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

volumes:
  udata-fs:
  app-logs:
