services:
  app:
    container_name: udata-backend-app
    build:
      context: .
      args:
        UDATA_UID: ${UDATA_UID:-10001}
        UDATA_GID: ${UDATA_GID:-10001}
    command: uv run uwsgi --ini uwsgi/front.ini
    ports:
      - '7000:7000'
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - ./udata/auth/saml/credentials:/app/udata/auth/saml/credentials
      - ${FS_ROOT:-/opt/dadosgov/fs}:/dadosgov/fs
      - app-logs:/logs
    env_file:
      - .env
    environment:
      UDATA_SETTINGS: /app/udata.cfg
      FS_ROOT: /dadosgov/fs
    restart: unless-stopped

  worker:
    container_name: udata-backend-worker
    build:
      context: .
      args:
        UDATA_UID: ${UDATA_UID:-10001}
        UDATA_GID: ${UDATA_GID:-10001}
    command: uv run celery -A udata.worker worker --events --concurrency=4 -l info
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - ./udata/auth/saml/credentials:/app/udata/auth/saml/credentials
      - ${FS_ROOT:-/opt/dadosgov/fs}:/dadosgov/fs
      - app-logs:/logs
    env_file:
      - .env
    environment:
      UDATA_SETTINGS: /app/udata.cfg
      FS_ROOT: /dadosgov/fs
    restart: unless-stopped

  beat:
    container_name: udata-backend-beat
    build:
      context: .
      args:
        UDATA_UID: ${UDATA_UID:-10001}
        UDATA_GID: ${UDATA_GID:-10001}
    command: uv run celery -A udata.worker beat -l info
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - app-logs:/logs
    env_file:
      - .env
    environment:
      UDATA_SETTINGS: /app/udata.cfg
    restart: unless-stopped

volumes:
  app-logs:
