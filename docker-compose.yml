services:
  # One-shot init: ensures ./logs (auto-created by Docker as root) is writable
  # by the app user before the services start. Runs on every `up`, then exits.
  # Also fixes ownership of pre-existing log files (e.g. created on the host).
  init-logs:
    container_name: udata-backend-init-logs
    image: busybox:stable
    command: sh -c "chown -R ${UDATA_UID:-10001}:${UDATA_GID:-10001} /logs && chmod 2775 /logs"
    volumes:
      - ./logs:/logs

  app:
    container_name: udata-backend-app
    depends_on:
      init-logs:
        condition: service_completed_successfully
    build:
      context: .
      args:
        UDATA_UID: ${UDATA_UID:-10001}
        UDATA_GID: ${UDATA_GID:-10001}
    command: uv run uwsgi --ini uwsgi/front.ini
    ports:
      - '7000:7000'
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - ./uwsgi:/app/uwsgi:ro
      - ./udata/auth/saml/credentials:/app/udata/auth/saml/credentials
      - ${FS_ROOT:-/opt/dadosgov/fs}:/dadosgov/fs
      - ./logs:/logs
    env_file:
      - .env
    environment:
      UDATA_SETTINGS: /app/udata.cfg
      FS_ROOT: /dadosgov/fs
    restart: unless-stopped

  worker:
    container_name: udata-backend-worker
    depends_on:
      init-logs:
        condition: service_completed_successfully
    build:
      context: .
      args:
        UDATA_UID: ${UDATA_UID:-10001}
        UDATA_GID: ${UDATA_GID:-10001}
    command: uv run celery -A udata.worker worker --events --concurrency=4 -l info --logfile=/logs/worker.log
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - ./udata/auth/saml/credentials:/app/udata/auth/saml/credentials
      - ${FS_ROOT:-/opt/dadosgov/fs}:/dadosgov/fs
      - ./logs:/logs
    env_file:
      - .env
    environment:
      UDATA_SETTINGS: /app/udata.cfg
      FS_ROOT: /dadosgov/fs
    restart: unless-stopped

  beat:
    container_name: udata-backend-beat
    depends_on:
      init-logs:
        condition: service_completed_successfully
    build:
      context: .
      args:
        UDATA_UID: ${UDATA_UID:-10001}
        UDATA_GID: ${UDATA_GID:-10001}
    command: uv run celery -A udata.worker beat -l info --logfile=/logs/beat.log
    volumes:
      - ./udata.cfg:/app/udata.cfg:ro
      - ./logs:/logs
    env_file:
      - .env
    environment:
      UDATA_SETTINGS: /app/udata.cfg
    restart: unless-stopped

  portainer_agent:
    container_name: portainer_agent
    image: portainer/agent:2.39.2
    ports:
      - '9001:9001'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
      - /:/host
    restart: always
